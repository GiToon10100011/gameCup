name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint (next lint)
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (Next.js)
        run: npm run build

  hook-verify:
    name: Husky hook · lint-staged dry run
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify pre-commit hook exists and is executable
        run: |
          test -x .husky/pre-commit || (echo "::error::.husky/pre-commit missing or not executable" && exit 1)
          echo "Pre-commit hook present:"
          cat .husky/pre-commit

      - name: Verify lint-staged config resolves
        run: npx lint-staged --help > /dev/null

      - name: Run lint-staged against full diff vs base
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          npx lint-staged --diff="origin/${{ github.base_ref }}...HEAD" --no-stash
