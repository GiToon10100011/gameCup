# CodeRabbit 리뷰 완료 자동 감지 → 라벨 + 알림 워크플로 (이슈 #81)
#
# 목적: CodeRabbit 리뷰가 "완전히" 끝났는지 매번 수동 확인하는 번거로움 제거.
# 동작(사용자 선택: 라벨 + 알림만, 수정은 수동):
#   - 조건 충족 시 PR에 `coderabbit-reviewed` 라벨 부착 + 사용자 멘션 알림 코멘트 1회
#
# "완전히 완료" 감지 전략:
#   CodeRabbit은 단일 "완료" 이벤트를 주지 않으므로, 신뢰 신호인 "체크 상태"로 게이트한다.
#   → head SHA의 모든 체크가 pending이 아니고 success일 때만 진행 (사용자 지시 2026.05.24).
#   리뷰(pull_request_review)·요약(issue_comment)이 체크 완료보다 먼저 와도, check_suite
#   completed 이벤트가 재평가를 일으킨다. 커밋 SHA 마커로 dedup해 라운드당 1회만 알린다.
#
# ⚠️ 활성화 조건: pull_request_review·issue_comment·check_suite 워크플로는 **default 브랜치
#   (main)의 정의로만 실행**된다. 본 파일이 main에 도달해야 실제로 발동한다 (가이드 참조).
name: CodeRabbit Notify

on:
  # CodeRabbit이 리뷰를 제출할 때
  pull_request_review:
    types: [submitted]
  # CodeRabbit이 요약/노액션 코멘트만 남기는 경우 포착 (리뷰 이벤트가 없을 수 있음)
  issue_comment:
    types: [created]
  # 체크가 리뷰보다 늦게 끝날 때 재평가시키는 트리거 (게이트 핵심)
  check_suite:
    types: [completed]

# 같은 PR(또는 커밋)에 대한 동시 실행을 직렬화 — 마커 dedup과 함께 중복 알림 방지
concurrency:
  group: coderabbit-notify-${{ github.event.check_suite.head_sha || github.event.pull_request.head.sha || github.event.issue.number }}
  cancel-in-progress: false

# 최상위는 읽기 전용 — 쓰기 권한은 실제 필요한 job에만 부여한다.
# (PR #82 리뷰 반영: 전역 write는 과권한이며 미래 job에 상속되므로 job 범위로 축소)
permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    # job 범위 최소 권한 — 각 권한의 실제 사용처를 주석으로 명시 (zizmor undocumented-permissions 대응)
    permissions:
      pull-requests: write # PR 대화 코멘트 생성 (issues.createComment 대상이 PR 번호 → write 필요)
      issues: write        # PR 라벨 부착·생성 (issues.addLabels / createLabel)
      checks: read         # 체크 런 조회 (checks.listForRef)
      statuses: read       # 커밋 상태 조회 (repos.getCombinedStatusForRef)
      contents: read       # 기본 메타데이터 읽기
    steps:
      - name: CodeRabbit 완료 판정 → 라벨 + 알림
        # 공급망 보안: 부동 태그(@v7) 대신 v7 커밋 SHA로 핀 (PR #82 리뷰 반영, SHA 직접 검증)
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const LABEL = 'coderabbit-reviewed';

            // 1) 이벤트별로 대상 PR 번호 + head SHA 해석
            //    세 트리거가 payload 모양이 달라 분기해서 추출한다.
            async function resolvePR() {
              const e = context.eventName;
              if (e === 'pull_request_review') {
                return { number: context.payload.pull_request.number, sha: context.payload.pull_request.head.sha };
              }
              if (e === 'issue_comment') {
                // PR에 달린 코멘트만 대상 (일반 이슈 코멘트는 제외)
                if (!context.payload.issue.pull_request) return null;
                const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: context.payload.issue.number });
                return { number: pr.number, sha: pr.head.sha };
              }
              if (e === 'check_suite') {
                const prs = context.payload.check_suite.pull_requests || [];
                if (prs.length === 0) return null;
                return { number: prs[0].number, sha: context.payload.check_suite.head_sha };
              }
              return null;
            }

            // 2) head SHA의 체크 상태 종합 → 'pending' | 'success' | 'failure'
            //    (PR #82 리뷰 반영) "완료"를 head SHA에 결박한다:
            //      · 같은 체크의 과거 런이 함께 와도 app.id+name별 **최신 1개**만 평가 (재시도 후 성공 오판 방지)
            //      · 이 SHA에 **CodeRabbit 체크 런이 존재**해야 "이 커밋을 리뷰함"으로 인정
            //        (PR 단위 활동만 보면 이전 커밋 활동으로 새 커밋이 통과하는 문제를 차단)
            //    체크 런(GitHub Actions·CodeRabbit 등) + 커밋 상태(GitGuardian 등) 둘 다 본다.
            async function checksState(sha) {
              const runs = await github.paginate(github.rest.checks.listForRef, { owner, repo, ref: sha, per_page: 100 });
              // 본 워크플로 자신의 실행은 평가에서 제외 — self-deadlock 방지 (PR #82 리뷰 반영).
              // 체크 런의 name은 워크플로명이 아니라 job명이라 불안정하므로, 현재 실행 id(context.runId)가
              // 담긴 details_url로 "이번 실행"을 정확히 식별해 제외한다. (자기 자신을 포함하면 항상
              // in_progress라 checksState가 영원히 pending을 반환해 알림이 절대 나가지 않는다.)
              const selfRunMarker = `/actions/runs/${context.runId}/`;
              const relevant = runs.filter((r) => !((r.details_url || '').includes(selfRunMarker)));

              // 같은 체크(app.id+name)의 최신 런 1개만 남긴다 — 과거 실패 런이 섞여 오판하지 않도록
              const latestByKey = new Map();
              for (const r of relevant) {
                const key = `${r.app?.id ?? 'na'}:${r.name}`;
                const ts = Date.parse(r.started_at || r.created_at || '') || 0;
                const prev = latestByKey.get(key);
                const prevTs = prev ? (Date.parse(prev.started_at || prev.created_at || '') || 0) : -1;
                if (!prev || ts >= prevTs) latestByKey.set(key, r);
              }
              const latest = [...latestByKey.values()];

              // 이 커밋에 대한 CodeRabbit 체크 런이 아직 없으면 "완료 아님(pending)"으로 본다 — head SHA 결박
              const isCodeRabbit = (r) => /coderabbit/i.test(r.name || '') || /coderabbit/i.test(r.app?.slug || '');
              if (!latest.some(isCodeRabbit)) return 'pending';

              // 최신 런 기준 미완료/실패 판정
              if (latest.some((r) => r.status !== 'completed')) return 'pending';
              const runFailed = latest.some((r) => !['success', 'neutral', 'skipped'].includes(r.conclusion));

              // 레거시 커밋 상태(Statuses API) — 체크 런이 아닌 GitGuardian 등을 포착
              const { data: combined } = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref: sha });
              const hasStatuses = combined.total_count > 0;
              if (hasStatuses && combined.state === 'pending') return 'pending';
              const statusFailed = hasStatuses && (combined.state === 'failure' || combined.state === 'error');

              if (runFailed || statusFailed) return 'failure';
              return 'success';
            }

            // ── 메인 흐름 ──────────────────────────────────────────────
            const pr = await resolvePR();
            if (!pr) { core.info('PR 컨텍스트가 아님 — skip'); return; }

            // 사용자 지시: 체크가 pending이 아니라 success일 때만 진행.
            // checksState가 head SHA에 CodeRabbit 체크 런 존재까지 강제하므로,
            // "이 커밋에 대한 CodeRabbit 리뷰가 끝났고 모든 체크가 통과"일 때만 success가 된다.
            const state = await checksState(pr.sha);
            if (state !== 'success') {
              core.info(`PR #${pr.number} (${pr.sha.slice(0, 7)}): 체크 상태=${state} — 아직 알림 보류`);
              return;
            }

            // 커밋 SHA 마커로 dedup — 같은 라운드(동일 커밋)에 1회만 알림
            const marker = `<!-- crnotify:${pr.sha} -->`;
            const existing = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: pr.number, per_page: 100 });
            if (existing.some((c) => (c.body || '').includes(marker))) {
              core.info(`PR #${pr.number} (${pr.sha.slice(0, 7)}): 이미 알림함 — skip`);
              return;
            }

            // 라벨이 없으면 생성 후 부착 (addLabels는 미존재 라벨에 실패할 수 있어 보수적으로 처리)
            try {
              await github.rest.issues.getLabel({ owner, repo, name: LABEL });
            } catch {
              try {
                await github.rest.issues.createLabel({ owner, repo, name: LABEL, color: 'a371f7', description: 'CodeRabbit 리뷰 + 모든 체크 통과 완료' });
              } catch (e) { core.info(`라벨 생성 생략: ${e.message}`); }
            }
            await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: [LABEL] });

            // 알림 코멘트 — 저장소 소유자를 멘션 (개인 저장소는 owner == 사용자)
            const body = [
              marker,
              `🤖 **CodeRabbit 리뷰 + 모든 체크 통과 완료** — 커밋 \`${pr.sha.slice(0, 7)}\``,
              '',
              `@${owner} 이제 \`리뷰 확인\`을 입력하면 코멘트를 점검·반영합니다.`,
            ].join('\n');
            await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
            core.info(`PR #${pr.number} (${pr.sha.slice(0, 7)}): 라벨 + 알림 완료`);
